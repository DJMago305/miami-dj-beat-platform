<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beats & Tips — Miami DJ Beat Magazine</title>
    <link rel="stylesheet" href="./styles.css?v=20260226-1">
    <link rel="stylesheet" href="./profile.css?v=20260226-1">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js?v=20260226-1"></script>
    <link rel="stylesheet" href="./mdj-assistant.css?v=20260306-1" />
    <style>
        :root {
            --magazine-font: 'Playfair Display', serif;
            --body-font: 'Inter', sans-serif;
            --gold: #c5a059;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #eee;
            font-family: var(--body-font);
            line-height: 1.8;
            margin: 0;
        }

        /* Magazine Header Section */
        .article-header {
            position: relative;
            padding: 120px 40px 60px;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .article-category {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
        }

        .article-title {
            font-family: var(--magazine-font);
            font-size: clamp(40px, 8vw, 84px);
            line-height: 1.1;
            margin-bottom: 30px;
            color: #fff;
        }

        .article-meta {
            font-size: 14px;
            color: #ccc;
            /* Un poco más clara para legibilidad sobre foto */
            font-style: italic;
            margin-top: 10px;
        }

        /* Hero Image - Cinematic */
        .article-hero {
            width: 100%;
            height: 90vh;
            background-size: cover;
            background-position: center;
            margin-bottom: 60px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .article-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-dark) 5%, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
        }

        .hero-overlay-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            padding: 0 40px;
        }

        /* Magazine Header Section refined */
        .article-header {
            text-align: center;
            padding: 0;
            margin: 0 auto;
        }

        .article-title {
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
        }

        /* Content Area */
        .article-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 25px;
            font-size: 19px;
            font-weight: 300;
        }

        .article-content h2,
        .article-content h3 {
            font-family: var(--magazine-font);
            color: var(--gold);
            margin-top: 60px;
            margin-bottom: 20px;
        }

        .article-content p {
            margin-bottom: 30px;
            color: #ccc;
        }

        .article-content p:first-of-type::first-letter {
            font-size: 72px;
            float: left;
            line-height: 1;
            margin-right: 15px;
            margin-top: 10px;
            color: var(--gold);
            font-family: var(--magazine-font);
        }

        /* Blockquote Style */
        .article-quote {
            font-family: var(--magazine-font);
            font-size: 32px;
            font-style: italic;
            color: #fff;
            border-left: 3px solid var(--gold);
            padding-left: 30px;
            margin: 60px 0;
            line-height: 1.3;
        }

        /* Inline Images */
        .article-img {
            width: 120%;
            margin-left: -10%;
            margin-top: 40px;
            margin-bottom: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 800px) {
            .article-img {
                width: 100%;
                margin-left: 0;
            }

            .article-title {
                font-size: 48px;
            }
        }

        .footer-simple {
            text-align: center;
            padding: 100px 40px;
            border-top: 1px solid #111;
            margin-top: 100px;
        }
    </style>
</head>

<body class="notranslate">
    <header class="header scrolled">
        <div class="header-top">
            <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
                <a href="./index.html" class="brand" style="text-decoration:none;">
                    <img src="./assets/logo-transparent.png" alt="Logo" class="logo-img">
                    <span class="brand-name" style="margin-left:10px; color:#fff;">Miami DJ Beat</span>
                </a>
                <a href="./index.html#beats-tips" class="btn-pill">← Volver a Beats & Tips</a>
            </div>
        </div>
    </header>

    <main id="article-viewer">
        <!-- Contenido dinámico inyectado por JS -->
        <article>
            <div class="article-hero" id="hero-area" style="display:none;">
                <div class="hero-overlay-content">
                    <div class="article-header" id="header-area">
                        <span class="article-category" id="cat-label">Magazine</span>
                        <h1 class="article-title" id="title-label">Cargando artículo...</h1>
                        <div class="article-meta" id="meta-label">Por Miami DJ Beat · 2026</div>
                    </div>
                </div>
            </div>

            <div class="article-content" id="content-area">
                <!-- Aquí entra el texto editado -->
            </div>
        </article>
    </main>

    <footer class="footer-simple">
        <p style="color:var(--gold); letter-spacing: 2px;">BEATS & TIPS MAGAZINE</p>
        <p style="font-size:12px; opacity:0.5;">© 2026 Miami DJ Beat. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                window.location.href = './index.html';
                return;
            }

            try {
                const sb = window.getSupabaseClient ? window.getSupabaseClient() : supabase;
                const { data: article, error } = await sb
                    .from('mdjpro_articles')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error || !article) throw error;

                // Update UI
                document.getElementById('title-label').innerText = article.title;
                document.getElementById('cat-label').innerText = article.category;
                document.getElementById('meta-label').innerText = `Por ${article.author} · ${new Date(article.created_at).toLocaleDateString()}`;

                const contentArea = document.getElementById('content-area');
                contentArea.innerHTML = article.content;

                if (article.image_url) {
                    const hero = document.getElementById('hero-area');
                    hero.style.backgroundImage = `url('${article.image_url}')`;
                    hero.style.display = 'block';
                }

                document.title = `${article.title} — Miami DJ Beat`;

            } catch (err) {
                console.error('Error loading article:', err);
                document.getElementById('title-label').innerText = 'Artículo no encontrado';
            }
        });
    </script>
    <!-- MDJ Assistant Booth (AI Sales Agent) -->
    <div id="mdj-assistant-booth">
        <!-- Chat Window & Trigger defined in mdj-assistant.css/js -->
        <div class="booth-window">
            <div class="booth-header">
                <div class="status-dot"></div>
                <div style="flex: 1;">
                    <h3>Booth Assistant</h3>
                    <div style="font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 700;">Sales & Negotiation
                        Expert</div>
                </div>
            </div>
            <div class="booth-messages"></div>
            <div class="booth-input-area">
                <input type="text" placeholder="Type your message here..." />
                <button class="booth-send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
        <div class="booth-trigger" title="Talk to Booth Assistant">
            <div class="avatar-glow"></div>
            <div style="font-size: 30px; z-index: 10;">🤖</div>
        </div>
    </div>
    <script src="./mdj-assistant.js?v=20260306-1"></script>
</body>

</html>
