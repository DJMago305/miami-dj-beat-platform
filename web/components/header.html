<header class="header">
    <div class="header-top">
        <div class="container">
            <div class="brand">
                <img src="./assets/logo-transparent.png" alt="Miami DJ Beat Logo" class="logo-img-eagle">
                <div class="brand-letters-wrapper">
                    <img src="./assets/logo-transparent Letras.png" alt="Miami DJ Beat Letters" class="brand-letters-img">
                </div>
            </div>

            <div class="header-actions">
                <div class="lang-switcher">
                    <span class="lang-btn" data-lang="en">EN</span>
                    <span class="lang-pipe">|</span>
                    <span class="lang-btn" data-lang="es">ES</span>
                </div>
                <!-- Auth Zone: Inyectada dinámicamente o persistente -->
                <div class="account" id="header-auth-zone" style="display:none;">
                    <button class="account-btn" id="accountBtn">
                        <img class="avatar" src="./assets/dj-avatar-placeholder.png" alt="Avatar" id="header-avatar-img" />
                        <span class="caret">▾</span>
                    </button>
                    <div class="account-menu" id="accountMenu">
                        <a href="./index.html" class="menu-item">Inicio</a>
                        <div class="menu-divider"></div>
                        <a href="#" class="menu-item danger" id="logoutBtn">Cerrar Sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
