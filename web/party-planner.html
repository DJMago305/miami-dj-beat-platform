<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDJPRO — Party Planner</title>
    <link rel="stylesheet" href="./styles.css?v=20260226-1">
    <style>
        .planner-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
        }

        .step-container {
            display: none;
        }

        .step-container.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .progress-bar {
            height: 4px;
            background: var(--line);
            margin-bottom: 40px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            width: 0%;
            transition: width 0.3s ease;
        }

        .recommendation-box {
            background: rgba(183, 148, 62, 0.1);
            border-left: 4px solid var(--gold);
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
        }
    </style>
    <link rel="stylesheet" href="./mdj-assistant.css?v=20260306-1" />
</head>

<body class="notranslate">
    <header class="header">
        <div class="header-top">
            <div class="container"
                style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <a href="index.html" class="brand" style="text-decoration: none;">
                    <img src="./assets/logo-transparent.png" alt="Logo" class="logo-img">
                    <div class="brand-text">
                        <div class="brand-name">Miami DJ Beat</div>
                        <div class="brand-tagline">Pro Event Planning</div>
                    </div>
                </a>
                <a href="index.html" class="btn-pill" style="font-size: 11px;">Volver al Inicio</a>
            </div>
        </div>
    </header>

    <main class="planner-container">
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>

        <div id="planner-form-content">
            <div class="loading-spinner">Cargando tu planera...</div>
        </div>

        <div class="flex" style="margin-top: 40px; justify-content: space-between;">
            <button id="prev-btn" class="btn secondary" style="display: none;">Anterior</button>
            <button id="next-btn" class="btn primary">Continuar</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./supabase-config.js?v=20260226-1"></script>
    <script src="./party-planner.js"></script>
    <!-- MDJ Assistant Booth (AI Sales Agent) -->
    <div id="mdj-assistant-booth">
        <!-- Chat Window & Trigger defined in mdj-assistant.css/js -->
        <div class="booth-window">
            <div class="booth-header">
                <div class="status-dot"></div>
                <div style="flex: 1;">
                    <h3>Booth Assistant</h3>
                    <div style="font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 700;">Sales & Negotiation
                        Expert</div>
                </div>
            </div>
            <div class="booth-messages"></div>
            <div class="booth-input-area">
                <input type="text" placeholder="Type your message here..." />
                <button class="booth-send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
        <div class="booth-trigger" title="Talk to Booth Assistant">
            <div class="avatar-glow"></div>
            <div style="font-size: 30px; z-index: 10;">🤖</div>
        </div>
    </div>
    <script src="./mdj-assistant.js?v=20260306-1"></script>
</body>

</html>
